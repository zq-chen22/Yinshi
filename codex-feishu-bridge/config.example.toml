# 复制到 ~/.config/codex-feishu-bridge/config.toml 后再修改。
# App Secret 不得写入本文件；只填写对应的环境变量名。

[bridge]
state_dir = "~/.local/share/codex-feishu-bridge"
database_path = "~/.local/share/codex-feishu-bridge/bridge.sqlite"
inbox_dir = "~/.local/share/codex-feishu-bridge/inbox"
outbox_dir = "~/.local/share/codex-feishu-bridge/outbox"
admin_scratch_dir = "~/.local/share/codex-feishu-bridge/admin-scratch"
managed_workspaces_dir = "~/.local/share/codex-feishu-bridge/workspaces"
codex_bin = "codex"

# 首次登记最近 3 个持久、顶层 Codex 对话；以后持续发现新近更新的对话。
initial_thread_count = 3
auto_discover_new_threads = true
source_kinds = ["cli", "vscode", "appServer", "unknown"]
sync_interval_seconds = 15

# 运行中的中间消息合并后最多每 2 秒刷新一次，避免逐 token 发送。
progress_update_seconds = 2.0
group_suffix = "-你的机器名称"

# 默认运行配置；键名与 Codex config.toml 对应。每个飞书对话仍可单独覆盖。
# 不填写 model/effort/service_tier 时继承该机器上的 Codex 默认值。
# model = "你的 Codex model id"
# model_reasoning_effort = "high"
# service_tier = "priority"
approval_policy = "on-request"
sandbox = "workspace-write"
allowed_workspace_roots = ["~"]

max_download_bytes = 52428800
max_upload_bytes = 31457280

[feishu]
# 首次可先留空，再用 pair-code 与 Codex 机器人完成所有者配对。
owner_conversation_open_id = ""
owner_user_id = ""
owner_union_id = ""
pairing_code_ttl_seconds = 900

[feishu.conversation]
# 因时而得谷组织内、只服务于本机的 Codex 应用。
app_id = ""
app_secret_env = "FEISHU_CONVERSATION_APP_SECRET"
